<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfall</title>
    <link rel="stylesheet" href="login/style.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

 <div class="stars" id="stars"></div>
 
    <div class="auth-container">
        <!-- Branding -->
        <div class="branding">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Central star with glow -->
                        <circle cx="24" cy="24" r="6" fill="#FBBF24" opacity="0.3"/>
                        <circle cx="24" cy="24" r="4" fill="#FBBF24"/>
                        
                        <!-- Star rays -->
                        <path d="M24 8 L24 16" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>
                        <path d="M24 32 L24 40" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>
                        <path d="M8 24 L16 24" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>
                        <path d="M32 24 L40 24" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>
                        
                        <!-- Diagonal rays -->
                        <path d="M13 13 L18 18" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>
                        <path d="M30 30 L35 35" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>
                        <path d="M35 13 L30 18" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>
                        <path d="M18 30 L13 35" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>
                        
                        <!-- Orbiting particles (representing falling stars) -->
                        <circle cx="16" cy="10" r="1.5" fill="#4F46E5"/>
                        <circle cx="38" cy="16" r="1.5" fill="#4F46E5"/>
                        <circle cx="32" cy="38" r="1.5" fill="#4F46E5"/>
                        <circle cx="10" cy="32" r="1.5" fill="#4F46E5"/>
                    </svg>
                </div>
                <span class="logo-text">Starfall</span>
            </div>
            <p class="tagline">Where conversations light up the night</p>
        </div>
 
        <!-- Login Form -->
        <div class="form-section active" id="loginForm">
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to continue your conversations</p>
 
            <form id="loginFormElement">
                <div class="input-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required>
                </div>
 
                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
 
                <div class="forgot-password">
                    <a href="#">Forgot password?</a>
                </div>
 
                <button type="submit" class="btn btn-primary" style="margin-top: 24px;">Sign in</button>
            </form>
 
            <div class="divider">or continue with</div>
 
            <div class="social-buttons">
                <button class="btn-social">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path d="M17.64 9.2C17.64 8.46 17.58 7.72 17.45 7H9V10.88H13.84C13.64 12.03 12.99 13.06 12.01 13.72V15.82H14.96C16.66 14.25 17.64 11.94 17.64 9.2Z" fill="#4285F4"/>
                        <path d="M9 18C11.43 18 13.47 17.19 14.96 15.82L12.01 13.72C11.17 14.28 10.11 14.62 9 14.62C6.65 14.62 4.67 13.03 3.96 10.9H0.96V13.09C2.49 16.13 5.56 18 9 18Z" fill="#34A853"/>
                        <path d="M3.96 10.9C3.57 9.75 3.57 8.25 3.96 7.1V4.91H0.96C-0.32 7.47 -0.32 10.53 0.96 13.09L3.96 10.9Z" fill="#FBBC04"/>
                        <path d="M9 3.38C10.18 3.36 11.32 3.8 12.19 4.61L14.82 2C13.38 0.66 11.46 -0.08 9 0C5.56 0 2.49 1.87 0.96 4.91L3.96 7.1C4.67 4.97 6.65 3.38 9 3.38Z" fill="#EA4335"/>
                    </svg>
                    Google
                </button>
                <button class="btn-social">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
                        <path d="M9 0C4.03 0 0 4.03 0 9C0 13.97 4.03 18 9 18C13.97 18 18 13.97 18 9C18 4.03 13.97 0 9 0ZM9 16.2C5.02 16.2 1.8 12.98 1.8 9C1.8 5.02 5.02 1.8 9 1.8C12.98 1.8 16.2 5.02 16.2 9C16.2 12.98 12.98 16.2 9 16.2Z"/>
                        <path d="M9 3.6C6.24 3.6 3.6 6.24 3.6 9C3.6 11.76 6.24 14.4 9 14.4C11.76 14.4 14.4 11.76 14.4 9C14.4 6.24 11.76 3.6 9 3.6ZM11.7 10.44L8.1 12.6V5.4L11.7 7.56C12.06 7.77 12.06 8.23 11.7 8.44L8.1 10.44Z"/>
                    </svg>
                    GitHub
                </button>
            </div>
 
            <div class="form-footer">
                Don't have an account? <a href="#" id="showSignup">Sign up</a>
            </div>
        </div>
 
        <!-- Signup Form -->
        <div class="form-section" id="signupForm">
            <h2>Create account</h2>
            <p class="subtitle">Join Starfall and start chatting</p>
 
            <form id="signupFormElement">
                <div class="input-group">
                    <label for="signupName">Display name</label>
                    <input type="text" id="signupName" placeholder="Your name" required>
                </div>
 
                <div class="input-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com" required>
                </div>
 
                <div class="input-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="••••••••" required>
                </div>
 
                <div class="input-group">
                    <label for="signupPasswordConfirm">Confirm password</label>
                    <input type="password" id="signupPasswordConfirm" placeholder="••••••••" required>
                </div>
 
                <button type="submit" class="btn btn-primary" style="margin-top: 24px;">Create account</button>
            </form>
 
            <div class="divider">or continue with</div>
 
            <div class="social-buttons">
                <button class="btn-social">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path d="M17.64 9.2C17.64 8.46 17.58 7.72 17.45 7H9V10.88H13.84C13.64 12.03 12.99 13.06 12.01 13.72V15.82H14.96C16.66 14.25 17.64 11.94 17.64 9.2Z" fill="#4285F4"/>
                        <path d="M9 18C11.43 18 13.47 17.19 14.96 15.82L12.01 13.72C11.17 14.28 10.11 14.62 9 14.62C6.65 14.62 4.67 13.03 3.96 10.9H0.96V13.09C2.49 16.13 5.56 18 9 18Z" fill="#34A853"/>
                        <path d="M3.96 10.9C3.57 9.75 3.57 8.25 3.96 7.1V4.91H0.96C-0.32 7.47 -0.32 10.53 0.96 13.09L3.96 10.9Z" fill="#FBBC04"/>
                        <path d="M9 3.38C10.18 3.36 11.32 3.8 12.19 4.61L14.82 2C13.38 0.66 11.46 -0.08 9 0C5.56 0 2.49 1.87 0.96 4.91L3.96 7.1C4.67 4.97 6.65 3.38 9 3.38Z" fill="#EA4335"/>
                    </svg>
                    Google
                </button>
                <button class="btn-social">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
                        <path d="M9 0C4.03 0 0 4.03 0 9C0 13.97 4.03 18 9 18C13.97 18 18 13.97 18 9C18 4.03 13.97 0 9 0ZM9 16.2C5.02 16.2 1.8 12.98 1.8 9C1.8 5.02 5.02 1.8 9 1.8C12.98 1.8 16.2 5.02 16.2 9C16.2 12.98 12.98 16.2 9 16.2Z"/>
                        <path d="M9 3.6C6.24 3.6 3.6 6.24 3.6 9C3.6 11.76 6.24 14.4 9 14.4C11.76 14.4 14.4 11.76 14.4 9C14.4 6.24 11.76 3.6 9 3.6ZM11.7 10.44L8.1 12.6V5.4L11.7 7.56C12.06 7.77 12.06 8.23 11.7 8.44L8.1 10.44Z"/>
                    </svg>
                    GitHub
                </button>
            </div>
 
            <div class="form-footer">
                Already have an account? <a href="#" id="showLogin">Sign in</a>
            </div>
        </div>
    </div>
 

    <script src="login/script.js"></script>
</body>
</html>
